services:
  postgres:
    image: postgres:16
    container_name: loan_underwriting_postgres
    environment:
      POSTGRES_DB: loan_underwriting
      POSTGRES_USER: loan_user
      POSTGRES_PASSWORD: loan_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_user -d loan_underwriting"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
